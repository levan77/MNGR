name = "mngr"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
# Secrets — set via: npx wrangler secret put SECRET_NAME --name mngr
#
# MASTER_PASSWORD        — password for the "master" super admin account
#                          also used as the HMAC signing key for session cookies
#
# SALON_CREDENTIALS      — JSON array of salon admin accounts, e.g.:
#   [{"username":"tbilisi","password":"pw1","salon_id":"d1"},
#    {"username":"batumi","password":"pw2","salon_id":"d2"},
#    {"username":"kutaisi","password":"pw3","salon_id":"d3"}]
